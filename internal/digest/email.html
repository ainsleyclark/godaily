<!DOCTYPE html>
<html>
<body>
	<h2>GoDaily &mdash; {{ .Date.Format "January 2, 2006" }}</h2>
	{{ range .Sections }}
		<h3>{{ .Source.NiceName }}</h3>
		<ul>
			{{ range .Items }}
				<li>
					{{ if .ImageURL }}<img src="{{ .ImageURL }}" alt="" width="80" style="vertical-align:middle;border-radius:4px;margin-right:8px;">{{ end }}
					<a href="{{ .URL }}">{{ .Title }}</a>{{ if .Author }} - {{ .Author.String }}{{ end }}
				</li>
			{{ end }}
		</ul>
	{{ end  }}
</body>
</html>
