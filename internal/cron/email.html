<!DOCTYPE html>
<html>
<body>
	<h2>GoDaily &mdash; {{ .Date.Format "January 2, 2006" }}</h2>
	{{ range .Sections }}
		<h3>{{ .Source.NiceName }}</h3>
		<ul>
			{{ range .Items }}
				<li><a href="{{ .URL }}">{{ .Title }}</a>{{if .Author}} - {{ .Author }}{{ end }}</li>
			{{ end }}
		</ul>
	{{ end  }}
</body>
</html>
