name: Collect Digest

on:
  schedule:
    # GitHub Actions cron is UTC. Two entries to keep firing at 01:00 London year-round:
    # the London-time guard below skips whichever line is running outside 01:00 local.
    - cron: "0 1 * * 1-5"   # 01:00 GMT (winter)  -> 01:00 London
    - cron: "0 0 * * 1-5"   # 00:00 UTC (summer)  -> 01:00 BST
  workflow_dispatch:
    inputs:
      dry-run:
        description: Skip persisting the digest
        type: boolean
        default: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check schedule matches London time
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          london_hour=$(TZ=Europe/London date +%H)
          if [[ "$london_hour" != "01" ]]; then
            echo "Skipping: London time is $london_hour:00, not 01:00."
            exit 0
          fi

      - name: Collect digest
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: go run main.go collect ${{ inputs.dry-run && '--dry-run' || '' }}
