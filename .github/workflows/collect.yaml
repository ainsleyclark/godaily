name: Collect Digest

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Skip persisting the digest
        type: boolean
        default: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check schedule matches London time
        id: check
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          london_hour=$(TZ=Europe/London date +%H)
          if [[ "$london_hour" != "01" ]]; then
            echo "Skipping: London time is $london_hour:00, not 01:00."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect digest
        if: github.event_name != 'schedule' || steps.check.outputs.should_run == 'true'
        env:
          APP_ENV: production
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_TOKEN: ${{ secrets.RESEND_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          EMAIL_SEND_ADDRESS: ${{ secrets.EMAIL_SEND_ADDRESS }}
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: go run main.go collect ${{ inputs.dry-run && '--dry-run' || '' }}
