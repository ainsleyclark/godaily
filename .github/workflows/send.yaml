name: Send Digest

on:
  schedule:
    # GitHub Actions cron is UTC. Two entries to keep firing at 08:00 London year-round:
    # the London-time guard below skips whichever line is running outside 08:00 local.
    - cron: "0 8 * * 1-5"   # 08:00 GMT (winter)  -> 08:00 London
    - cron: "0 7 * * 1-5"   # 07:00 UTC (summer)  -> 08:00 BST
  workflow_dispatch:
    inputs:
      dry-run:
        description: Skip sending the email
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check schedule matches London time
        id: check
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          london_hour=$(TZ=Europe/London date +%H)
          if [[ "$london_hour" != "08" ]]; then
            echo "Skipping: London time is $london_hour:00, not 08:00."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send digest
        if: github.event_name != 'schedule' || steps.check.outputs.should_run == 'true'
        env:
          APP_ENV: production
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_TOKEN: ${{ secrets.RESEND_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          EMAIL_SEND_ADDRESS: ${{ secrets.EMAIL_SEND_ADDRESS }}
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: go run main.go send

      - name: Send synth suggestion
        if: github.event_name != 'schedule' || steps.check.outputs.should_run == 'true'
        env:
          APP_ENV: production
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_TOKEN: ${{ secrets.RESEND_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          EMAIL_SEND_ADDRESS: ${{ secrets.EMAIL_SEND_ADDRESS }}
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: go run main.go synth send
