version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/db/migrations"
    queries: "internal/store/queries"
    gen:
      go:
        package: "sqlc"
        out: "internal/store/internal/sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: false
        emit_empty_slices: true
        overrides:
          - column: "issues.sent_at"
            go_type: "time.Time"
          - column: "subscribers.confirmed_at"
            go_type:
              type: "Time"
              import: "time"
              pointer: true
          - column: "subscribers.unsubscribed_at"
            go_type:
              type: "Time"
              import: "time"
              pointer: true
          - column: "subscribers.created_at"
            go_type: "time.Time"
