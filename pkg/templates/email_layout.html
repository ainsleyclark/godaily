{{ define "email-layout" }}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="x-apple-disable-message-reformatting">
  <title>GoDaily</title>
</head>
<body style="margin:0;padding:0;background-color:#f5fbff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#f5fbff;">
    <tr>
      <td align="center" style="padding:24px 16px;">
        <table width="680" cellpadding="0" cellspacing="0" role="presentation" style="max-width:680px;width:100%;background:#ffffff;border:1px solid #d0e8f5;">

          {{ block "email-body" . }}{{ end }}

          <!-- Footer -->
          <tr>
            <td style="padding:20px 32px;border-top:1px solid #d0e8f5;text-align:center;">
              {{ if .CanonicalURL }}
              <div style="margin-bottom:14px;">
                <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:11px;color:#6b9ab8;margin-bottom:8px;">Enjoying this issue? Share it &rarr;</div>
                <a href="{{ .CanonicalURL }}" style="display:inline-block;margin:0 3px 4px;padding:5px 11px;background:#f5fbff;border:1px solid #d0e8f5;color:#0d2236;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:11px;font-weight:600;text-decoration:none;">View online</a>
                <a href="{{ .ShareLinkedIn }}" style="display:inline-block;margin:0 3px 4px;padding:5px 11px;background:#f5fbff;border:1px solid #d0e8f5;color:#0d2236;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:11px;font-weight:600;text-decoration:none;">LinkedIn</a>
                <a href="{{ .ShareBluesky }}" style="display:inline-block;margin:0 3px 4px;padding:5px 11px;background:#f5fbff;border:1px solid #d0e8f5;color:#0d2236;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:11px;font-weight:600;text-decoration:none;">Bluesky</a>
                <a href="{{ .ShareTwitter }}" style="display:inline-block;margin:0 3px 4px;padding:5px 11px;background:#f5fbff;border:1px solid #d0e8f5;color:#0d2236;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:11px;font-weight:600;text-decoration:none;">X / Twitter</a>
              </div>
              {{ end }}
              <div style="font-size:12px;color:#6b9ab8;line-height:2;">
                Sent by <strong style="color:#0d2236;">GoDaily</strong>{{ if .UnsubscribeURL }} &middot; <a href="{{ .UnsubscribeURL }}" style="color:#1a7fa8;text-decoration:none;">Unsubscribe</a>{{ end }}
              </div>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
{{ end }}
