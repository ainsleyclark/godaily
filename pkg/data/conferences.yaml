# Go conferences curated list.
#
# Each entry defines a major Go conference. The file is consumed by two
# features:
#
#   1. The email digest source (pkg/source/conferences.go) emits an item
#      on each date in notify_dates so the digest reminds readers about
#      the conference at announcement / 3-months-out / 1-week-out.
#
#   2. The Wednesday community-promo social rotation
#      (pkg/services/social/candidates/community.go) tags the conference's
#      social handles on a rotating schedule to boost engagement.
#
# Phase ordering (by index in notify_dates):
#   0 → announcement     (TagConference)
#   1 → reminder         (TagConferenceReminder, typically ~3 months before)
#   2 → alert            (TagConferenceAlert, typically ~1 week before)
#
# Optional handle fields (used by the social rotation, ignored by the
# digest). Leave blank — empty string — when unknown; the rotation
# falls back to a no-mention template variant.
#
#   linkedin: company-or-group-slug   # e.g. "gophercon-europe" → linkedin.com/company/gophercon-europe
#   bluesky:  full-handle             # e.g. "gophercon.eu"
#   mastodon: @user@instance          # e.g. "@gopher@hachyderm.io"
#
# Adding a new conference:
#   1. Add an entry below (slug must be unique).
#   2. Set notify_dates to the days you want notifications to appear.
#   3. Commit the change — it takes effect on the next daily collect run.
#
# Updating dates for a recurring conference:
#   Duplicate the entry with the new year's slug and dates.
#   The old entry can be removed once all its notify_dates have passed.
#
# Reference: https://go.dev/wiki/Conferences

