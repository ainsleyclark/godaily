  url: https://gophercon.eu/
  location: Berlin, Germany
  start_date: 2026-06-15
  end_date: 2026-06-18
  description: "The European Go conference, bringing together Gophers from across the continent for workshops, talks, and networking."
  handles:
    linkedin:
      slug: gopherconeu
      urn: urn:li:organization:112502228
    bluesky: gopherconeu.bsky.social
    mastodon: ""
  notify_dates:
