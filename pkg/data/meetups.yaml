# Go meetups curated list.
#
# Drives the Wednesday community-promo social rotation
# (pkg/services/social/candidates/community.go). Each Wednesday picks an
# entry and tags its social handles so the meetup group gets a notification
# and (often) reshares.
#
# Schema:
#   slug:        stable unique id (used in the social-post subject)
#   name:        human display name
#   url:         primary group page (Meetup.com, own site, etc.)
#   location:    city / region — short, free text
#   description: one sentence shown in the post
#   linkedin:    company-or-group slug, e.g. "golang-london" → linkedin.com/groups/golang-london
#   bluesky:     full handle, e.g. "golanglondon.bsky.social"
#   mastodon:    @user@instance
#
# Leave any handle field blank ("") when unknown — the rotation falls
# back to a no-mention template variant.
#
# Adding a meetup:
#   1. Append an entry (slug must be unique).
#   2. Commit. It joins the rotation pool on the next Wednesday.
#
# References:
#   https://www.meetup.com/find/?keywords=golang
#   https://go.dev/wiki/Conferences (also lists user groups)

